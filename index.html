<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rinae's Birthday Wishlist</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #ffffff;
      padding: 4rem 3rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    h1 {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 2rem;
      font-weight: 300;
      color: #1a1a1a;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .birthday-date {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: #1a1a1a;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: #999;
      letter-spacing: 1px;
    }

    .wishlist {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2.5rem 2rem;
    }

    .gift-card {
      background: #ffffff;
      text-align: center;
      transition: transform 0.3s ease, opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 0.3rem;
      position: relative;
    }

    .gift-card.purchased {
      opacity: 0.45;
    }

    .gift-card.purchased .image-frame::after {
      content: 'Purchased';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1px solid #1a1a1a;
      padding: 0.4rem 1rem;
      background: rgba(255, 255, 255, 0.85);
      pointer-events: none;
      z-index: 2;
    }

    .gift-card:hover {
      transform: translateY(-4px);
    }

    .gift-card.purchased:hover {
      transform: none;
    }

    .image-frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      margin-bottom: 1.2rem;
      background: #f9f9f9;
      position: relative;
    }

    .gift-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gift-card:not(.purchased):hover img {
      transform: scale(1.04);
    }

    .gift-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #2c2c2c;
      letter-spacing: 0.5px;
      line-height: 1.4;
      margin-bottom: 0.3rem;
      padding: 0 0.3rem;
    }

    .gift-price {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      color: #999;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .buy-btn {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1a1a1a;
      text-decoration: none;
      border: 1px solid #ddd;
      padding: 0.6rem 1.8rem;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: auto;
    }

    .buy-btn:hover {
      background: #1a1a1a;
      color: #ffffff;
      border-color: #1a1a1a;
    }

    .purchased-toggle {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      color: #bbb;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 0.6rem;
      padding: 0.3rem 0.5rem;
      transition: color 0.2s ease;
    }

    .purchased-toggle:hover {
      color: #1a1a1a;
    }

    .gift-card.purchased .purchased-toggle {
      color: #1a1a1a;
    }

    .address-section {
      text-align: center;
      margin-top: 3.5rem;
      padding-top: 3rem;
      border-top: 1px solid #eee;
    }

    .address-text {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: #999;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      margin-top: 1rem;
    }

    .footer-text {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 1px;
    }

    /* Phone adjustments */
    @media (max-width: 600px) {
      body {
        padding: 1.5rem 0.8rem;
      }

      .container {
        padding: 2.5rem 1.2rem;
      }

      h1 {
        font-size: 1.5rem;
        letter-spacing: 3px;
      }

      .wishlist {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1.8rem 1rem;
      }

      .gift-name {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Rinae's Birthday Wishlist</h1>
      <p class="birthday-date">🎂 24 August 2026</p>
      <p class="subtitle">A curated collection of things that would make me smile</p>
    </div>

    <div class="wishlist" id="wishlistContainer">
      <!-- Gifts appear here -->
    </div>

    <div class="address-section">
      <p class="address-text">Please WhatsApp for my delivery address at <strong>065 987 2927</strong></p>
    </div>

    <div class="footer">
      <p class="footer-text">Click any item to view it · Mark gifts as purchased to avoid duplicates</p>
    </div>
  </div>

  <script>
    const gifts = [
      {
        name: "YSL Libre Parfum",
        image: "https://assets.woolworthsstatic.co.za/Libre-Eau-de-Parfum-Intense-30ml-505637206.jpg?V=2y1r&o=eyJidWNrZXQiOiJ3dy1vbmxpbmUtaW1hZ2UtcmVzaXplIiwia2V5IjoiaW1hZ2VzL2VsYXN0aWNlcmEvcHJvZHVjdHMvaGVyby8yMDIxLTA2LTEwLzUwNTYzNzIwNl8zME1MX2hlcm8uanBnIn0&q=85",
        link: "https://www.woolworths.co.za/prod/_/A-505637206"
      },
      {
        name: "Amber Labdanum Cologne Intense",
        image: "https://sdcdn.io/jm/jm_sku_L2CB01_3000x3000_0S.png?height=1400px&width=1400px",
        link: "https://www.bookshop.org/books/indoor-plant-books/"
      },
      {
        name: "Veuve Clicquot Bottle Holder",
        image: "https://www.ngf.co.za/wp-content/uploads/2024/11/107017.jpg",
        link: "https://www.ngf.co.za/product/veuve-clicquot-yellow-label-bottle-holder-750ml/"
      },
      {
        name: "Citrine Necklace",
        image: "https://downtoearthjewellery.co.za/cdn/shop/files/IMG_1798.jpg?v=1761999468&width=2200",
        link: "https://downtoearthjewellery.co.za/products/small-citrine-pendant-november-birthstone"
      },
      {
        name: "Coach Kisslock 16",
        image: "https://cdn.fynd.com/v2/falling-surf-7c8bb8/fyprod/wrkr/products/pictures/item/free/original/196395963225/Fko2FuM9oJJ-196395963225-1.jpg",
        link: "https://coach.co.za/product/kisslock-frame-bag-16-in-crystal-signature-jacquard?f_content=a2lzc2xvY2s6Ojo2Ojo6bXJ3MjFvcjEtb3p3azJvc3U%253D&f_medium=search"
      },
      {
        name: "Coach Jet Shoulder Bag",
        image: "https://cdn.fynd.com/v2/falling-surf-7c8bb8/fyprod/wrkr/products/pictures/item/free/original/4gqcP7lSF-product.jpeg",
        link: "https://coach.co.za/product/jet-shoulder-bag-196395766000?f_content=amV0Ojo6Mjo6Om1ydzI5MWtsLXdobXdyd3Vx&f_medium=search"
      },
      {
        name: "Wine Folly",
        image: "https://media.takealot.com/covers_tsins/44159753/9780718183073-1-zoom.jpg",
        link: "https://www.takealot.com/wine-folly/PLID41395528"
      },
      {
        name: "Brown Wooden Freestanding Wine Cabinet",
        image: "https://media.takealot.com/covers_images/f62f513034c44947b6a1169792753440/s-zoom.file",
        link: "https://www.takealot.com/4-tier-wooden-freestanding-wine-rack-multi-purpose-wine-cabinet/PLID100742025?colour_variant=Brown"
      },
      {
        name: "Modern Glass Coffee Table",
        image: "https://media.takealot.com/covers_images/e9b475e99acd4e62beb25b95dc03daf1/s-zoom.file",
        link: "https://www.takealot.com/aeror-modern-glass-coffee-table-with-wooden-base/PLID101254690?colour_variant=Brown"
      }
    ];

    // Load saved purchased state from browser storage
    const savedPurchased = JSON.parse(localStorage.getItem("purchasedGifts") || "[]");

    const container = document.getElementById("wishlistContainer");

    gifts.forEach((gift, index) => {
      const isPurchased = savedPurchased.includes(index);

      const card = document.createElement("div");
      card.className = "gift-card";
      if (isPurchased) card.classList.add("purchased");

      card.innerHTML = `
        <div class="image-frame">
          <img src="${gift.image}" alt="${gift.name}" loading="lazy">
        </div>
        <div class="gift-name">${gift.name}</div>
        ${gift.price ? `<div class="gift-price">${gift.price}</div>` : ""}
        <a class="buy-btn" href="${gift.link}" target="_blank" rel="noopener">View</a>
        <button class="purchased-toggle">${isPurchased ? "✓ Purchased" : "Mark as purchased"}</button>
      `;

      // Toggle purchased state
      const toggleBtn = card.querySelector(".purchased-toggle");
      toggleBtn.addEventListener("click", () => {
        card.classList.toggle("purchased");
        const currentlyPurchased = card.classList.contains("purchased");

        // Update button text
        toggleBtn.textContent = currentlyPurchased ? "✓ Purchased" : "Mark as purchased";

        // Save to browser storage
        const updatedPurchased = JSON.parse(localStorage.getItem("purchasedGifts") || "[]");
        if (currentlyPurchased) {
          if (!updatedPurchased.includes(index)) updatedPurchased.push(index);
        } else {
          const pos = updatedPurchased.indexOf(index);
          if (pos > -1) updatedPurchased.splice(pos, 1);
        }
        localStorage.setItem("purchasedGifts", JSON.stringify(updatedPurchased));
      });

      container.appendChild(card);
    });
  </script>
</body>
</html>
